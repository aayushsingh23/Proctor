<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Proctoring Session</title>

    <!-- Socket.IO client library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
        }

        video {
            border: 2px solid #333;
            transform: scaleX(-1);
            /* Mirror effect */
        }

        canvas {
            display: none;
            /* Hidden for processing only */
        }
    </style>
</head>

<body>
    <h1>AI Proctoring Session</h1>
    <p>Status: <b id="status">Connecting to server...</b></p>

    <video id="video" width="640" height="480" autoplay muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const socket = io();

            const video = document.getElementById("video");
            const canvas = document.getElementById("canvas");
            const context = canvas.getContext("2d");
            const status = document.getElementById("status");

            socket.on("connect", () => {
                console.log("Successfully connected to the server.");
                status.textContent = "Connected. Starting camera...";
                startCamera();
            });

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = stream;
                    status.textContent = "Streaming video data...";

                    setInterval(() => {
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const imageData = canvas.toDataURL("image/jpeg", 0.7);
                        socket.emit("video_stream", { image: imageData });
                    }, 200);

                } catch (error) {
                    console.error("Camera access error:", error);
                    status.textContent = "Error: Could not access the camera.";
                }
            };
        });
    </script>
</body>

</html>
